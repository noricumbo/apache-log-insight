<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Apache Log Dashboard</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <h1>Apache Log Dashboard</h1>
  <p id="meta"></p>
  <div id="dataNotice" class="notice" role="status" aria-live="polite"></div>

  <div class="summary">
    <div class="card">
      <div>Total parsed requests</div>
      <span id="totalRequests" class="summary-value">0</span>
    </div>
    <div class="card">
      <div>Top status code</div>
      <span id="topStatus" class="summary-value">-</span>
    </div>
    <div class="card">
      <div>Distinct categories</div>
      <span id="categoryCount" class="summary-value">0</span>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Requests by category</h2>
      <svg id="categoryChart" width="600" height="320"></svg>
    </div>

    <div class="card">
      <h2>Top IPs</h2>
      <div class="table-wrap">
        <table id="topIps"></table>
      </div>
    </div>

    <div class="card">
      <h2>Top hosts</h2>
      <div class="table-wrap">
        <table id="topHosts"></table>
      </div>
    </div>
  </div>

  <div class="card full">
    <h2>Attack types per minute</h2>
    <svg id="timelineChart" width="1000" height="360"></svg>
  </div>

  <div class="card full">
    <h2>Recent requests</h2>
    <table id="recent"></table>
  </div>

  <div class="modal" id="ipReportModal" hidden>
    <div class="modal-backdrop" id="ipReportBackdrop"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="ipReportTitle">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <h2 id="ipReportTitle">Detail Report</h2>
          <div class="modal-subtitle">Focused incident-style breakdown from the current parser window.</div>
        </div>
        <button type="button" class="modal-close" id="ipReportClose">Close</button>
      </div>
      <div id="ipReport"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="./app.js"></script>
</body>
</html>
